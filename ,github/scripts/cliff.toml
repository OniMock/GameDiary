# git-cliff configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true
# changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = [
    # links de issues
    { pattern = "#([0-9]+)", replace = "[#${1}](https://github.com/OniMock/snes9xTYL/issues/${1})" },

    # old commits
    { pattern = "^\\[add\\]", replace = "feat:" },
    { pattern = "^\\[implement\\]", replace = "feat:" },
    { pattern = "^\\[remove\\]", replace = "feat:" }
]
commit_parsers = [
    # Skip commit: chore(release): xxxxx
    { message = "^chore\\(release\\)", skip = true },
    # Skip commit: [skip cliff]
    { message = "\\[skip cliff\\]", skip = true },

    { message = ".*BREAKING CHANGE.*", group = "💥 Breaking Changes" },
    { message = "^feat", group = "🚀 Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactor" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^chore", group = "🔧 Misc" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit_parsers
filter_commits = true
# glob pattern for matching git tags
tag_pattern = "v[0-9]*"
# regex for skipping tags
skip_tags = "v1.9.0-beta.1"
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by prefix
sort_commits = "newest"
# limit the number of commits included in the changelog.
# limit_commits = 100
